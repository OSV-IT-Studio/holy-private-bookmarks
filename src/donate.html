<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google" content="notranslate">
    <title data-i18n="supportPageTitle"></title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/donate.css">
</head>
<body>
    <div class="donate-wrapper">

        <div class="hero-section">
            <div class="hero-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
            </div>
            <h1 class="hero-title" data-i18n="donateHeroTitle"></h1>
            <p class="hero-subtitle" data-i18n="donateHeroSubtitle"></p>
        </div>


        <div class="impact-section">
            <h2 class="section-title" data-i18n="whySupport"></h2>
            <div class="impact-grid">
                <div class="impact-item">
                    <span class="impact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                        </svg>
                    </span>
                    <h3 data-i18n="timeInvestment"></h3>
                    <p data-i18n="timeInvestmentDesc"></p>
                </div>
                <div class="impact-item">
                    <span class="impact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                    </span>
                    <h3 data-i18n="longTerm"></h3>
                    <p data-i18n="longTermDesc"></p>
                </div>
                <div class="impact-item">
                    <span class="impact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M4 4v16h16" />
                            <path d="M20 10l-6-6-4 8-4-4-6 6" />
                        </svg>
                    </span>
                    <h3 data-i18n="futureFeatures"></h3>
                    <p data-i18n="futureFeaturesDesc"></p>
                </div>
            </div>
        </div>


        <div class="cta-message">
            <p data-i18n="donateCtaText"></p>
        </div>

        <h2 class="section-title" data-i18n="donateCryptoTitle"></h2>
        

        <div class="donate-container">
		<div class="donate-card" data-address="TFy6hrDvi2jiKJcQQ9zibkr41TmLVtKaSC">
                <h3>
                    
                    <span>USDT (TRC20)</span>
                </h3>
                <img src="icons/gr-USDT-TRC20.png" alt="TRC20 QR" class="qr" loading="lazy">
                <div class="address">TFy6hrDvi2jiKJcQQ9zibkr41TmLVtKaSC</div>
                <button class="copy-btn" data-action="copy" data-i18n="copyAddress">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span data-i18n="copyAddress"></span>
                </button>
            </div>
			
            <div class="donate-card" data-address="bc1q9rz9uu9c48ydrmgrmu9kzqjp9mrdzavcll09uq">
                <h3>
                    
                    <span>Bitcoin (BTC)</span>
                </h3>
                <img src="icons/qr-btc.png" alt="BTC QR" class="qr" loading="lazy">
                <div class="address">bc1q9rz9uu9c48ydrmgrmu9kzqjp9mrdzavcll09uq</div>
                <button class="copy-btn" data-action="copy" data-i18n="copyAddress">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span data-i18n="copyAddress"></span>
                </button>
            </div>

            <div class="donate-card" data-address="0xAc862138b1ebF8d7F4fdb23D821489Cf91c314d0">
                <h3>
                    
                    <span>Ethereum (ETH)</span>
                </h3>
                <img src="icons/qr-eth.png" alt="ETH QR" class="qr" loading="lazy">
                <div class="address">0xAc862138b1ebF8d7F4fdb23D821489Cf91c314d0</div>
                <button class="copy-btn" data-action="copy" data-i18n="copyAddress">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span data-i18n="copyAddress"></span>
                </button>
            </div>
        </div>


        <div class="thanks-section">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            <p data-i18n="donateThanks"></p>
            <p class="thanks-note" data-i18n="donateThanksNote"></p>
        </div>
    </div>

    <script src="js/modules/i18n.js"></script>
    <script src="js/modules/theme.js"></script>
    <script src="js/donate.js"></script>
</body>
</html>
