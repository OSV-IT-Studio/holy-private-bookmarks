<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="google" content="notranslate">
    <title data-i18n="managerTitle"></title>
    <link rel="stylesheet" href="css/manager.css">
	<link rel="stylesheet" href="css/loader.css">
</head>
<body>
 <div id="theme-loader-block">
    <div class="loader-container">
      <div class="loader-spinner"></div>
    </div>
  </div>

  <div class="container" style="display: none;">
    <div class="sidebar">
      <div class="logo">
        <div class="logo-icon"><img src="icons/icon48.png"></div>
        <div class="logo-text">Holy Private Bookmarks</div>
      </div>
<div class="actions-container" style="margin-bottom: 24px;">

  <button id="manual-lock-btn" class="lockManager">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
    <span class="btn-text"  data-i18n="lockManager"></span>
  </button>
  

  
</div>

      <div class="folders-section">
        <div class="folders-title" data-i18n="folders"></div>
        <ul class="folder-tree" id="folder-tree">
          <li class="folder-item all-bookmarks active" data-folder-id="all">
            <div class="folder-content">
              <span class="folder-toggle">▶</span>
             <div class="folder-icon">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="9 1 11.5 6.5 17 7.5 13 11.5 14 17 9 14 4 17 5 11.5 1 7.5 6.5 6.5 9 1" fill="currentColor" fill-opacity="0.15"/>
    </svg>
</div>
              <div class="folder-name" data-i18n="allBookmarks"></div>
            </div>
            <div class="folder-badge" id="all-count">0</div>
          </li>
        </ul>
      </div>
    </div>

<div class="sidebar-resizer" id="sidebar-resizer"></div>
    <div class="main-content">
      <div class="header">
     <div class="header-top">
    <div id="breadcrumbs" class="breadcrumbs-container">
        <span class="breadcrumb-item  active" data-folder-id="all">
            <svg class="breadcrumb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            
        <span data-i18n="allBookmarks"></span></span>
    </div>
  </div>
      </div>

           <div class="toolbar">
        <div class="search-container">
          <input type="search" id="search-input" class="search-input" placeholder="Search bookmarks..." data-i18n="searchBookmarks">
          <span class="search-icon">🔍</span>
        </div>
       <div class="toolbar-buttons">

    <button id="new-folder-btn" class="toolbar-btn">
        <span class="toolbar-btn__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                <line x1="12" y1="11" x2="12" y2="17"></line>
                <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
        </span>
        <span class="toolbar-btn__text" data-i18n="newFolder"></span>
    </button>
    
    <button id="add-bookmark-btn" class="toolbar-btn toolbar-btn--primary">
        <span class="toolbar-btn__icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </span>
        <span class="toolbar-btn__text" data-i18n="addBookmark"></span>
    </button>
</div>
      </div>

      <div class="bookmarks-container">
        <div id="bookmarks-grid" class="bookmarks-grid"></div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
          <div class="empty-state__icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
    </svg>
</div>
           <h3 class="empty-state__title" data-i18n="noBookmarksInFolder"></h3>
			<p class="empty-state__text" data-i18n="addBookmarksToGetStarted"></
        </div>
      </div>
    </div>
  </div>


<div class="theme-switcher">
    <button id="quick-theme-toggle" class="theme-toggle-btn" data-i18n-title="themeToggle" title="Switch theme">
        <svg class="theme-toggle-btn__icon theme-toggle-btn__icon--dark" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="theme-toggle-btn__icon theme-toggle-btn__icon--light" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="5" />
            <line x1="11" y1="1" x2="11" y2="3" />
            <line x1="11" y1="19" x2="11" y2="21" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="16.36" y1="16.36" x2="17.78" y2="17.78" />
            <line x1="1" y1="11" x2="3" y2="11" />
            <line x1="19" y1="11" x2="21" y2="11" />
            <line x1="4.22" y1="17.78" x2="5.64" y2="16.36" />
            <line x1="16.36" y1="5.64" x2="17.78" y2="4.22" />
        </svg>
        <svg class="theme-toggle-btn__icon theme-toggle-btn__icon--system" width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="18" height="14" rx="2" ry="2" />
            <line x1="8" y1="21" x2="14" y2="21" />
            <line x1="11" y1="17" x2="11" y2="21" />
        </svg>
    </button>
</div>

  <script src="js/modules/i18n.js"></script>
  <script src="js/modules/secure-utils.js"></script>
  <script src="js/modules/crypto-wrapper.js"></script>
  <script src="js/modules/theme.js"></script>
  <script src="js/modules/shared.js"></script>
  <script src="js/loader.js"></script>
  
  <script src="js/modules/login-ui.js"></script>
  <script src="js/modules/manager-lock.js"></script>
<script src="js/modules/manager-folders.js"></script>
<script src="js/modules/manager-bookmarks.js"></script>
<script src="js/modules/manager-drag-drop.js"></script>
<script src="js/manager.js"></script>
<script src="js/modules/manager-resize.js"></script>
</body>
</html>
